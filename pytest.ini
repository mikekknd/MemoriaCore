[pytest]
testpaths = tests
markers =
    slow: 標記為耗時測試（可用 -m "not slow" 排除）
    flaky: 標記為不穩定測試（自動重試）
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider
# 自動重試不穩定測試（需安裝 pytest-retry）
# addopts = -v --tb=short --reruns 1 --reruns-delay 1
