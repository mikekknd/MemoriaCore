<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriaCore Dashboard</title>
<link rel="stylesheet" href="/static/shared/theme.css">
<style>
:root { --left-width: 40%; }
body { height:100vh; overflow:hidden; }
.status-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:6px 16px; display:flex; align-items:center; gap:12px; font-size:13px; height:36px; flex-shrink:0; }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--error); flex-shrink:0; }
.status-dot.ok { background:var(--accent2); }
.status-text { color:var(--text2); }
.dashboard { display:flex; height:calc(100vh - 36px); }
.panel-left { width:var(--left-width); min-width:300px; max-width:70%; display:flex; flex-direction:column; border-right:1px solid var(--border); }
.panel-left iframe { border:none; width:100%; height:100%; flex:1; min-height:0; background:var(--bg); }
.resize-handle { width:4px; background:var(--border); cursor:col-resize; flex-shrink:0; transition:background .15s; }
.resize-handle:hover, .resize-handle.active { background:var(--accent); }
.panel-right { flex:1; min-width:350px; display:flex; flex-direction:column; overflow:hidden; }
.tab-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 12px; display:flex; gap:0; flex-shrink:0; }
.tab-btn { background:none; border:none; border-bottom:2px solid transparent; padding:10px 16px; color:var(--text2); font-size:13px; cursor:pointer; white-space:nowrap; transition:all .15s; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); opacity:1; }
.tab-content { flex:1; overflow:hidden; position:relative; }
.tab-pane { display:none; position:absolute; inset:0; overflow:hidden; }
.tab-pane.active { display:flex; flex-direction:column; }
.tab-pane iframe { border:none; width:100%; height:100%; flex:1; min-height:0; background:var(--bg); }
.viewer-toolbar { background:var(--surface); border-bottom:1px solid var(--border); padding:6px 12px; display:flex; gap:8px; align-items:center; flex-shrink:0; }
.viewer-toolbar button { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 12px; color:var(--text); font-size:12px; }
.viewer-toolbar button:hover { border-color:var(--accent); color:var(--accent); opacity:1; }
.viewer-toolbar button.active { background:var(--accent); color:#fff; border-color:var(--accent); opacity:1; }
.viewer-frames { flex:1; display:flex; min-height:0; }
.viewer-frames iframe { flex:1; min-width:0; }
.viewer-frames iframe.hidden { display:none; }
@media (max-width:900px) {
  .dashboard { flex-direction:column; }
  .panel-left { width:100% !important; max-width:100%; height:50vh; border-right:none; border-bottom:1px solid var(--border); }
  .resize-handle { display:none; }
  .panel-right { min-width:0; }
}
</style>
</head>
<body>
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">connecting...</span>
</div>

<div class="dashboard">
  <div class="panel-left" id="panelLeft">
    <iframe id="chatFrame" src="/static/chat.html" title="MemoriaCore Chat"></iframe>
  </div>

  <div class="resize-handle" id="resizer"></div>

  <div class="panel-right">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="viewer" onclick="switchTab(this)">Log / DB</button>
      <button class="tab-btn" data-tab="routing" onclick="switchTab(this)">routing</button>
      <button class="tab-btn" data-tab="prompts" onclick="switchTab(this)">Prompts</button>
      <button class="tab-btn" data-tab="persona" onclick="switchTab(this)">人格演化</button>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" data-pane="viewer">
        <div class="viewer-toolbar">
          <button class="active" onclick="setViewerMode('both',this)">side by side</button>
          <button onclick="setViewerMode('log',this)">Log only</button>
          <button onclick="setViewerMode('db',this)">DB only</button>
          <span style="margin-left:auto"></span>
          <button onclick="reloadLogViewer()">reload Log</button>
        </div>
        <div class="viewer-frames" id="viewerFrames">
          <iframe id="logFrame" src="/static/log_viewer.html?api=true" title="Log Viewer"></iframe>
          <iframe id="dbFrame" src="/static/db_viewer.html" title="DB Viewer"></iframe>
        </div>
      </div>

      <div class="tab-pane" data-pane="routing">
        <iframe src="/static/routing.html" title="Task Routing"></iframe>
      </div>

      <div class="tab-pane" data-pane="prompts">
        <iframe src="/static/prompts.html" title="Prompt Management"></iframe>
      </div>

      <div class="tab-pane" data-pane="persona">
        <iframe id="personaTreeFrame" src="/static/persona_tree.html" title="Persona Evolution"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="/static/shared/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  setInterval(checkHealth, 15000);
  initResizer();
});

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(3000)});
    if (r.ok) {
      document.getElementById('statusDot').classList.add('ok');
      document.getElementById('statusText').textContent = 'connected';
    } else {
      throw 0;
    }
  } catch {
    document.getElementById('statusDot').classList.remove('ok');
    document.getElementById('statusText').textContent = 'disconnected';
  }
}

function initResizer() {
  const resizer = document.getElementById('resizer');
  const panel = document.getElementById('panelLeft');
  let startX, startW;
  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    startW = panel.offsetWidth;
    resizer.classList.add('active');
    const onMove = ev => {
      const w = Math.min(Math.max(startW + ev.clientX - startX, 300), window.innerWidth * 0.7);
      panel.style.width = w + 'px';
    };
    const onUp = () => {
      resizer.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function switchTab(btn) {
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.dataset.pane === tab));
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && !e.shiftKey && !e.altKey) {
    const map = {'1':'viewer','2':'routing','3':'prompts','4':'persona'};
    const tab = map[e.key];
    if (tab) {
      e.preventDefault();
      const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (btn) switchTab(btn);
    }
  }
});

function setViewerMode(mode, btn) {
  document.querySelectorAll('.viewer-toolbar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('logFrame').classList.toggle('hidden', mode === 'db');
  document.getElementById('dbFrame').classList.toggle('hidden', mode === 'log');
}

function reloadLogViewer() {
  const frame = document.getElementById('logFrame');
  try { frame.contentWindow.postMessage('reload-logs', '*'); } catch {}
  setTimeout(() => { try { frame.contentWindow.location.reload(); } catch {} }, 300);
}
</script>
</body>
</html>
