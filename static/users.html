<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriaCore Users</title>
<link rel="stylesheet" href="/static/shared/theme.css">
<style>
body { min-height:100vh; overflow:auto; }
.page { padding:16px 20px 32px; }
.header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
h1 { font-size:18px; margin:0; }
.hint { color:var(--text2); font-size:13px; line-height:1.5; margin-bottom:14px; }
button { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:12px; cursor:pointer; }
button:hover { border-color:var(--accent); color:var(--accent); opacity:1; }
button.danger { color:var(--error); border-color:var(--error); }
button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
table { width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--border); }
th, td { border-bottom:1px solid var(--border); padding:8px 10px; text-align:left; font-size:13px; vertical-align:top; }
th { color:var(--text2); font-weight:600; background:var(--surface2); position:sticky; top:0; z-index:1; }
td.mono { font-family:'Cascadia Code','Fira Code',monospace; font-size:12px; }
.actions { display:flex; gap:6px; flex-wrap:wrap; }
.stats { color:var(--text2); line-height:1.5; white-space:nowrap; }
.empty { color:var(--text2); padding:24px; text-align:center; }
.toast-container { position:fixed; right:16px; bottom:16px; }
</style>
</head>
<body>
<main class="page">
  <div class="header">
    <h1 data-i18n="users.title">使用者帳號</h1>
    <button class="primary" onclick="loadUsers()" data-i18n="users.reload">重新載入</button>
  </div>
  <div class="hint" data-i18n="users.hint">刪除帳號是測試清理工具，會移除該帳號、登入嘗試、對話、profile、memory 與 topic cache。操作不可復原，且必須輸入完整 username 確認。</div>
  <div id="content" class="empty" data-i18n="users.loading">載入中...</div>
</main>
<div class="toast-container" id="toastContainer"></div>

<script src="/static/shared/common.js"></script>
<script src="/static/shared/i18n.js"></script>
<script>
let users = [];

document.addEventListener('DOMContentLoaded', async () => {
  await MCI18N.init();
  MCI18N.apply();
  loadUsers();
});

async function loadUsers() {
  const content = document.getElementById('content');
  content.className = 'empty';
  content.textContent = MCI18N.t('users.loading');
  try {
    const r = await fetch(`${API}/admin/users`);
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(apiErrorMessage(data, MCI18N.t('users.load_failed')));
    users = data;
    renderUsers();
  } catch (err) {
    content.className = 'empty';
    content.textContent = err.message || MCI18N.t('users.load_failed');
  }
}

function renderUsers() {
  const content = document.getElementById('content');
  if (!users.length) {
    content.className = 'empty';
    content.textContent = MCI18N.t('users.empty');
    return;
  }
  content.className = '';
  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>${escapeHtml(MCI18N.t('users.username'))}</th>
          <th>${escapeHtml(MCI18N.t('users.role'))}</th>
          <th>${escapeHtml(MCI18N.t('users.created_at'))}</th>
          <th>Token</th>
          <th>${escapeHtml(MCI18N.t('users.stats'))}</th>
          <th>${escapeHtml(MCI18N.t('users.actions'))}</th>
        </tr>
      </thead>
      <tbody>
        ${users.map(renderUserRow).join('')}
      </tbody>
    </table>
  `;
}

function renderUserRow(user) {
  const s = user.stats || {};
  return `
    <tr>
      <td class="mono">${user.id}</td>
      <td>
        <div>${escapeHtml(user.username)}</div>
        ${user.nickname ? `<div class="stats">${escapeHtml(user.nickname)}</div>` : ''}
      </td>
      <td>${escapeHtml(user.role)}</td>
      <td class="mono">${escapeHtml(user.created_at || '')}</td>
      <td class="mono">v${user.token_version || 0}</td>
      <td class="stats">
        ${escapeHtml(MCI18N.t('users.stats_line1', {sessions: s.sessions || 0, messages: s.messages || 0}))}<br>
        ${escapeHtml(MCI18N.t('users.stats_line2', {blocks: s.memory_blocks || 0, core: s.core_memories || 0}))}<br>
        ${escapeHtml(MCI18N.t('users.stats_line3', {profiles: s.profiles || 0, topics: s.topics || 0}))}
      </td>
      <td>
        <div class="actions">
          <button onclick="revokeUser(${user.id})">${escapeHtml(MCI18N.t('users.revoke'))}</button>
          <button onclick="resetPassword(${user.id}, '${escapeJs(user.username)}')">${escapeHtml(MCI18N.t('users.reset_password'))}</button>
          <button class="danger" onclick="deleteUser(${user.id}, '${escapeJs(user.username)}')">${escapeHtml(MCI18N.t('users.delete'))}</button>
        </div>
      </td>
    </tr>
  `;
}

async function revokeUser(userId) {
  try {
    const r = await fetch(`${API}/admin/users/${userId}/revoke`, { method:'POST' });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(apiErrorMessage(data, MCI18N.t('users.revoke_failed')));
    toast(MCI18N.t('users.revoked'), 'success');
    loadUsers();
  } catch (err) {
    toast(err.message || MCI18N.t('users.revoke_failed'), 'error');
  }
}

async function resetPassword(userId, username) {
  const password = prompt(MCI18N.t('users.reset_prompt', {username}));
  if (!password) return;
  try {
    const r = await fetch(`${API}/admin/users/${userId}/password`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({new_password: password}),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(apiErrorMessage(data, MCI18N.t('users.reset_failed')));
    toast(MCI18N.t('users.reset_done'), 'success');
    loadUsers();
  } catch (err) {
    toast(err.message || MCI18N.t('users.reset_failed'), 'error');
  }
}

async function deleteUser(userId, username) {
  const confirmation = prompt(MCI18N.t('users.delete_prompt', {username}));
  if (confirmation === null) return;
  if (confirmation !== username) {
    toast(MCI18N.t('users.confirm_mismatch'), 'error');
    return;
  }
  try {
    const r = await fetch(`${API}/admin/users/${userId}`, {
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({confirm_username: confirmation}),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(apiErrorMessage(data, MCI18N.t('users.delete_failed')));
    toast(MCI18N.t('users.deleted', {username}), 'success');
    loadUsers();
  } catch (err) {
    toast(err.message || MCI18N.t('users.delete_failed'), 'error');
  }
}

function escapeJs(value) {
  return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
</script>
</body>
</html>
