<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriaCore Profile</title>
<link rel="stylesheet" href="/static/shared/theme.css">
<style>
body { min-height:100vh; overflow:auto; }
.page { max-width:760px; margin:0 auto; padding:20px; }
.section { border-bottom:1px solid var(--border); padding:18px 0; }
h1 { font-size:20px; margin-bottom:4px; }
h2 { font-size:15px; margin-bottom:12px; }
.meta { color:var(--text2); font-size:13px; }
.grid { display:grid; grid-template-columns:160px 1fr; gap:10px 14px; align-items:center; }
label { color:var(--text2); font-size:13px; }
input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--text); outline:none; }
input:focus { border-color:var(--accent); }
.actions { margin-top:14px; display:flex; gap:8px; justify-content:flex-end; }
button { background:var(--accent); border:none; border-radius:6px; padding:8px 16px; color:#fff; cursor:pointer; }
@media (max-width:640px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="page">
  <h1>個人設定</h1>
  <div class="meta" id="accountMeta"></div>

  <section class="section">
    <h2>基本資料</h2>
    <div class="grid">
      <label for="nickname">暱稱</label>
      <input id="nickname">
      <label for="telegramUid">Telegram UID</label>
      <input id="telegramUid">
      <label for="discordUid">Discord UID</label>
      <input id="discordUid">
    </div>
    <div class="actions"><button onclick="saveProfile()">儲存</button></div>
  </section>

  <section class="section">
    <h2>修改密碼</h2>
    <div class="grid">
      <label for="oldPassword">舊密碼</label>
      <input id="oldPassword" type="password" autocomplete="current-password">
      <label for="newPassword">新密碼</label>
      <input id="newPassword" type="password" autocomplete="new-password">
    </div>
    <div class="actions"><button onclick="changePassword()">更新密碼</button></div>
  </section>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="/static/shared/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', loadMe);

async function loadMe() {
  const r = await fetch(`${API}/auth/me`);
  if (!r.ok) return;
  const me = await r.json();
  storeCsrf(me.csrf_token);
  document.getElementById('accountMeta').textContent = `${me.username} / ${me.role}`;
  document.getElementById('nickname').value = me.nickname || '';
  document.getElementById('telegramUid').value = me.telegram_uid || '';
  document.getElementById('discordUid').value = me.discord_uid || '';
}

async function saveProfile() {
  try {
    const r = await fetch(`${API}/auth/profile`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        nickname: document.getElementById('nickname').value,
        telegram_uid: document.getElementById('telegramUid').value,
        discord_uid: document.getElementById('discordUid').value,
      }),
    });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(apiErrorMessage(data, '儲存失敗'));
    }
    toast('已儲存', 'success');
    loadMe();
  } catch (err) {
    toast(err.message || '儲存失敗', 'error');
  }
}

async function changePassword() {
  try {
    const r = await fetch(`${API}/auth/password`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        old_password: document.getElementById('oldPassword').value,
        new_password: document.getElementById('newPassword').value,
      }),
    });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(apiErrorMessage(data, '修改失敗'));
    }
    clearCsrf();
    toast('密碼已更新，請重新登入', 'success');
    setTimeout(() => window.top.location.href = '/static/login.html', 800);
  } catch (err) {
    toast(err.message || '修改失敗', 'error');
  }
}
</script>
</body>
</html>
