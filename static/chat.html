<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriaCore Chat</title>
<link rel="stylesheet" href="/static/shared/theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
body { height:100vh; overflow:hidden; }
.chat-shell { height:100vh; display:flex; flex-direction:column; }
.chat-header { background:var(--surface); padding:8px 12px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.chat-header select { min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:13px; outline:none; }
.session-select { flex:1.3; }
.group-picker { display:block; position:relative; min-width:220px; max-width:360px; flex:.9; }
.group-picker-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:13px; cursor:pointer; min-height:30px; }
.group-picker-btn:hover, .group-picker.open .group-picker-btn { border-color:var(--accent); color:var(--accent); opacity:1; }
.group-picker-btn:disabled { opacity:.45; cursor:not-allowed; border-color:var(--border); color:var(--text2); }
.group-picker-panel { display:none; position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:20; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 22px rgba(0,0,0,.32); padding:6px; max-height:260px; overflow-y:auto; }
.group-picker.open .group-picker-panel { display:block; }
.group-picker-hint { display:flex; justify-content:space-between; align-items:center; padding:6px 8px 8px; margin-bottom:4px; border-bottom:1px solid var(--border); color:var(--text2); font-size:11px; }
.group-picker-hint .hint-count { color:var(--accent); font-family:'Cascadia Code','Fira Code',monospace; }
.group-picker-hint .hint-count.at-limit { color:var(--warn); }
.group-option { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:6px; color:var(--text); font-size:13px; cursor:pointer; }
.group-option:hover { background:var(--surface2); }
.group-option.disabled { opacity:.45; cursor:not-allowed; }
.group-option.disabled:hover { background:none; }
.group-option input { margin:0; flex-shrink:0; }
.group-option span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-header button { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; color:var(--text); font-size:13px; cursor:pointer; white-space:nowrap; }
.chat-header button:hover { border-color:var(--accent); color:var(--accent); }
.session-chip { color:var(--accent); font-family:'Cascadia Code','Fira Code',monospace; font-size:11px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.msg { max-width:88%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.65; word-wrap:break-word; }
.msg.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.msg.assistant { align-self:flex-start; background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg.assistant.typing { color:var(--text2); }
.msg-author { color:var(--accent); font-size:11px; line-height:1.2; margin-bottom:4px; font-weight:600; }
.typing-indicator { display:flex; align-items:center; gap:4px; min-width:42px; min-height:22px; }
.typing-dot { width:6px; height:6px; border-radius:50%; background:var(--text2); opacity:.35; animation:typingPulse 1.15s infinite ease-in-out; }
.typing-dot:nth-child(2) { animation-delay:.16s; }
.typing-dot:nth-child(3) { animation-delay:.32s; }
@keyframes typingPulse { 0%, 80%, 100% { transform:translateY(0); opacity:.35; } 40% { transform:translateY(-3px); opacity:1; } }
.msg.assistant .md-content p { margin:0.4em 0; }
.msg.assistant .md-content pre { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px; margin:8px 0; overflow-x:auto; }
.msg.assistant .md-content code { font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; }
.msg.assistant .md-content :not(pre)>code { background:var(--surface2); padding:1px 5px; border-radius:3px; font-size:13px; }
.msg.assistant .md-content img { display:block; max-width:100%; height:auto; margin:8px 0; border-radius:8px; border:1px solid var(--border); cursor:pointer; background:var(--bg); }
.msg.assistant .md-content a:has(img) { display:block; max-width:100%; }
.msg.system-info { align-self:center; background:none; color:var(--text2); font-size:12px; padding:4px; font-style:italic; }
.msg.tool-status { align-self:flex-start; background:var(--surface2); border:1px solid var(--border); color:var(--warn); font-size:13px; padding:6px 12px; border-radius:8px; }
.msg.tool-status .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--warn); border-radius:50%; animation:spin .6s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.debug-toggle { font-size:11px; color:var(--text2); cursor:pointer; margin-top:6px; user-select:none; }
.debug-toggle:hover { color:var(--accent); }
.debug-panel { display:none; margin-top:8px; padding:10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; font-size:12px; line-height:1.6; max-height:400px; overflow-y:auto; }
.debug-panel.open { display:block; }
.debug-section { margin-bottom:8px; }
.debug-section-title { color:var(--accent); font-weight:600; margin-bottom:4px; }
.debug-section pre { white-space:pre-wrap; word-break:break-all; color:var(--text2); font-family:'Cascadia Code','Fira Code',monospace; font-size:11px; }
.perf-bar-row { display:flex; align-items:center; gap:8px; margin:2px 0; }
.perf-bar-label { width:140px; text-align:right; color:var(--text2); font-size:11px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.perf-bar-track { flex:1; height:14px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.perf-bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }
.perf-bar-ms { width:60px; font-size:11px; color:var(--text2); font-family:monospace; }
.block-detail { background:var(--surface2); border-radius:4px; padding:6px 8px; margin:4px 0; font-family:monospace; font-size:11px; }
.block-score { display:inline-block; margin-right:8px; }
.chat-input { background:var(--surface); border-top:1px solid var(--border); padding:10px 12px; display:flex; gap:8px; flex-shrink:0; }
.chat-input textarea { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:14px; resize:none; outline:none; font-family:inherit; min-height:40px; max-height:120px; line-height:1.4; }
.chat-input textarea:focus { border-color:var(--accent); }
.chat-input textarea::placeholder { color:var(--text2); }
.send-btn { background:var(--accent); border:none; border-radius:8px; padding:8px 16px; color:#fff; font-size:14px; cursor:pointer; align-self:flex-end; white-space:nowrap; }
.send-btn:hover { opacity:.85; }
.send-btn:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>
<div class="chat-shell">
  <div class="chat-header">
    <select id="sessionSelect" class="session-select" onchange="switchSession(this.value)">
      <option value="">-- select session --</option>
    </select>
    <div id="groupPicker" class="group-picker">
      <button type="button" class="group-picker-btn" onclick="toggleGroupPicker(event)" title="最多 6 個 AI 同時參與對話">
        <span id="groupPickerLabel">select AIs</span>
        <span>▾</span>
      </button>
      <div class="group-picker-panel">
        <div class="group-picker-hint">
          <span>最多 6 個 AI 同時參與對話</span>
          <span class="hint-count" id="groupPickerCount">0/6</span>
        </div>
        <div id="groupCharacterList"></div>
      </div>
    </div>
    <span class="session-chip" id="statusSession"></span>
    <button onclick="createNewSession()">+ new</button>
    <button onclick="deleteCurrentSession()" title="delete current session">x</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input">
    <textarea id="chatInput" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1" onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">send</button>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="/static/shared/common.js"></script>
<script>
let currentSessionId = null;
let currentCharacterId = null;
let currentCharacterIds = [];
let currentSessionMode = 'single';
let isSending = false;
let _ttsAudio = null;
let _pendingTtsEl = null;
let _ttsQueue = [];
let _ttsPlaying = false;
let characters = [];
let charactersById = new Map();
const MAX_SESSION_CHARACTERS = 6;

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

document.addEventListener('DOMContentLoaded', () => {
  loadCharacters()
    .finally(() => loadSessionList())
    .then(() => autoRestoreOrCreate());
});

async function loadCharacters() {
  try {
    let r = await fetch(`${API}/character`);
    if (!r.ok) {
      r = await fetch(`${API}/personality-public/characters`);
    }
    if (!r.ok) throw new Error('load characters failed');
    const data = await r.json();
    characters = Array.isArray(data) ? data : [];
    charactersById = new Map(characters.map(c => [c.character_id, c]));
    const groupList = document.getElementById('groupCharacterList');
    groupList.innerHTML = '';
    characters.forEach(c => {
      const item = document.createElement('label');
      item.className = 'group-option';
      item.innerHTML = `
        <input type="checkbox" value="${escapeHtml(c.character_id)}" onchange="syncGroupPickerLabel()">
        <span>${escapeHtml(c.name || c.character_id)}</span>
      `;
      groupList.appendChild(item);
    });
    if (!currentCharacterId && characters.length) {
      currentCharacterId = characters[0].character_id;
    }
    if (!currentCharacterIds.length && currentCharacterId) {
      currentCharacterIds = [currentCharacterId];
    }
    syncCharacterSelect();
  } catch {
    toast('Failed to load AI list', 'error');
  }
}

function characterNameForId(characterId) {
  const char = charactersById.get(characterId);
  return char ? (char.name || characterId) : (characterId || 'AI');
}

function syncCharacterSelect() {
  const groupList = document.getElementById('groupCharacterList');
  if (groupList) {
    const selected = new Set(currentCharacterIds.length ? currentCharacterIds : [currentCharacterId]);
    groupList.querySelectorAll('input[type="checkbox"]').forEach(input => {
      input.checked = selected.has(input.value);
    });
    syncGroupPickerLabel();
  }
}

function selectedGroupCharacterIds() {
  const groupList = document.getElementById('groupCharacterList');
  if (!groupList) return [...new Set(currentCharacterIds.filter(Boolean))];
  const selected = Array.from(document.querySelectorAll('#groupCharacterList input[type="checkbox"]:checked'))
    .map(input => input.value)
    .filter(Boolean);
  return [...new Set(selected)];
}

function toggleGroupPicker(event) {
  event?.stopPropagation();
  const picker = document.getElementById('groupPicker');
  if (isSending) return;
  picker.classList.toggle('open');
}

function syncGroupPickerLabel() {
  const label = document.getElementById('groupPickerLabel');
  if (!label) return;
  const ids = selectedGroupCharacterIds();
  if (!ids.length) {
    label.textContent = 'select at least one AI';
  } else if (ids.length <= 2) {
    label.textContent = ids.map(characterNameForId).join(', ');
  } else {
    label.textContent = `${ids.length}/${MAX_SESSION_CHARACTERS} AIs selected`;
  }
  currentCharacterIds = ids;
  currentCharacterId = ids[0] || currentCharacterId;
  applyRosterLimitState();
}

function applyRosterLimitState() {
  const count = selectedGroupCharacterIds().length;
  const countEl = document.getElementById('groupPickerCount');
  if (countEl) {
    countEl.textContent = `${count}/${MAX_SESSION_CHARACTERS}`;
    countEl.classList.toggle('at-limit', count >= MAX_SESSION_CHARACTERS);
  }
  const atLimit = count >= MAX_SESSION_CHARACTERS;
  document.querySelectorAll('#groupCharacterList input[type="checkbox"]').forEach(input => {
    if (isSending) return;
    const shouldDisable = atLimit && !input.checked;
    input.disabled = shouldDisable;
    input.closest('.group-option')?.classList.toggle('disabled', shouldDisable);
  });
}

function setRosterControlsDisabled(disabled) {
  const picker = document.getElementById('groupPicker');
  const btn = picker?.querySelector('.group-picker-btn');
  if (btn) btn.disabled = !!disabled;
  if (disabled) picker?.classList.remove('open');
  document.querySelectorAll('#groupCharacterList input[type="checkbox"]').forEach(input => {
    input.disabled = !!disabled;
    input.closest('.group-option')?.classList.toggle('disabled', !!disabled);
  });
  if (!disabled) applyRosterLimitState();
}

document.addEventListener('click', e => {
  const picker = document.getElementById('groupPicker');
  if (picker && !picker.contains(e.target)) picker.classList.remove('open');
});

function sessionCharacterLabel(session) {
  const ids = session.character_ids && session.character_ids.length ? session.character_ids : [session.character_id];
  const names = ids.map(characterNameForId);
  if ((session.session_mode || 'single') === 'group' || ids.length > 1) {
    return `${session.group_name || 'Group'}: ${names.join(', ')}`;
  }
  return names[0] || 'AI';
}

async function loadSessionList() {
  try {
    const r = await fetch(`${API}/session/history?limit=30`);
    const sessions = await r.json();
    const sel = document.getElementById('sessionSelect');
    sel.innerHTML = '<option value="">-- select session --</option>';
    sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.session_id;
      const dt = new Date(s.created_at).toLocaleString('zh-TW', {hour12:false});
      const ch = s.channel || '';
      const ai = sessionCharacterLabel(s);
      opt.textContent = `${dt} [${ch}] ${ai} (${s.message_count} msgs)`;
      if (s.session_id === currentSessionId) opt.selected = true;
      sel.appendChild(opt);
    });
    return sessions;
  } catch { return []; }
}

async function autoRestoreOrCreate() {
  const sel = document.getElementById('sessionSelect');
  if (sel.options.length > 1) {
    await switchSession(sel.options[1].value);
  } else {
    await createNewSession();
  }
}

async function createNewSession(characterIds = selectedGroupCharacterIds()) {
  try {
    const ids = [...new Set((characterIds || []).filter(Boolean))];
    if (!ids.length) {
      toast('Select at least one AI', 'info');
      return false;
    }
    const body = {channel: 'dashboard', character_ids: ids};
    const r = await fetch(`${API}/session`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('create session failed');
    const data = await r.json();
    currentSessionId = data.session_id;
    currentCharacterId = data.character_id || ids[0] || currentCharacterId;
    currentCharacterIds = data.character_ids || [currentCharacterId];
    currentSessionMode = data.session_mode || (currentCharacterIds.length > 1 ? 'group' : 'single');
    syncCharacterSelect();
    updateSessionDisplay();
    document.getElementById('messages').innerHTML = '';
    await loadSessionList();
    document.getElementById('sessionSelect').value = currentSessionId;
    toast('New session created', 'success');
    return true;
  } catch {
    toast('Failed to create session', 'error');
    return false;
  }
}

async function switchSession(sessionId) {
  if (!sessionId) return;
  currentSessionId = sessionId;
  updateSessionDisplay();
  document.getElementById('messages').innerHTML = '';
  try {
    await fetch(`${API}/session/${sessionId}/restore`, {method:'POST'});
    const r = await fetch(`${API}/session/history/${sessionId}`);
    const data = await r.json();
    currentCharacterId = data.session?.character_id || currentCharacterId;
    currentCharacterIds = data.session?.character_ids || [currentCharacterId];
    currentSessionMode = data.session?.session_mode || (currentCharacterIds.length > 1 ? 'group' : 'single');
    syncCharacterSelect();
    const msgs = data.messages || [];
    msgs.forEach(m => {
      if (m.role === 'system_event') {
        appendSystemEvent(m.content, null, false);
      } else {
        appendMessage(m.role, m.content, null, false, m.character_name, m.character_id);
      }
    });
    scrollToBottom();
  } catch {
    toast('Failed to load session', 'error');
  }
}

async function deleteCurrentSession() {
  if (!currentSessionId) return;
  if (!confirm('Delete current session?')) return;
  try {
    await fetch(`${API}/session/history/${currentSessionId}`, {method:'DELETE'});
    currentSessionId = null;
    document.getElementById('messages').innerHTML = '';
    updateSessionDisplay();
    await loadSessionList();
    toast('Session deleted', 'info');
  } catch { toast('Failed to delete session', 'error'); }
}

function updateSessionDisplay() {
  document.getElementById('statusSession').textContent = currentSessionId ? currentSessionId.substring(0, 8) + '...' : '';
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function playTtsAudio(base64Data, format) {
  console.log('[TTS] tts_audio 事件收到，bytes(base64 len):', base64Data.length);
  _ttsQueue.push({base64Data, format});
  if (!_ttsPlaying) playNextTtsAudio();
}

function playNextTtsAudio() {
  const item = _ttsQueue.shift();
  if (!item) {
    _ttsPlaying = false;
    return;
  }
  _ttsPlaying = true;
  try {
    if (_ttsAudio) {
      _ttsAudio.pause();
      _ttsAudio.src = '';
      _ttsAudio = null;
    }
    if (_pendingTtsEl) {
      _pendingTtsEl.remove();
      _pendingTtsEl = null;
    }

    const dataUrl = `data:audio/${item.format};base64,${item.base64Data}`;
    _ttsAudio = new Audio(dataUrl);
    _ttsAudio.addEventListener('ended', playNextTtsAudio, {once:true});
    _ttsAudio.addEventListener('error', e => {
      console.error('[TTS] Audio 播放錯誤:', e.target.error);
      playNextTtsAudio();
    });
    _ttsAudio.play().then(() => {
      console.log('[TTS] 播放成功');
    }).catch(err => {
      console.warn('[TTS] Auto-play blocked:', err.message, '→ 顯示播放按鈕');
      _showTtsPlayButton(dataUrl);
    });
  } catch (e) {
    console.error('[TTS] playTtsAudio error:', e);
    playNextTtsAudio();
  }
}

function _showTtsPlayButton(dataUrl) {
  const btn = document.createElement('div');
  btn.style.cssText = `
    position:fixed; bottom:80px; right:20px; z-index:999;
    background:var(--accent); color:#fff; padding:8px 16px;
    border-radius:20px; cursor:pointer; font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.3); user-select:none;
  `;
  btn.innerHTML = '🔊 點擊播放語音';
  btn.onclick = () => {
    _ttsAudio = new Audio(dataUrl);
    _ttsAudio.addEventListener('ended', playNextTtsAudio, {once:true});
    _ttsAudio.play().catch(e => console.error('[TTS] Manual play failed:', e));
    btn.remove();
    _pendingTtsEl = null;
  };
  document.body.appendChild(btn);
  _pendingTtsEl = btn;
  setTimeout(() => {
    if (_pendingTtsEl === btn) {
      btn.remove();
      _pendingTtsEl = null;
      playNextTtsAudio();
    }
  }, 30000);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || isSending) return;
  const rosterIds = selectedGroupCharacterIds();
  if (!rosterIds.length) {
    toast('Select at least one AI', 'info');
    return;
  }
  if (rosterIds.length > MAX_SESSION_CHARACTERS) {
    toast(`最多 ${MAX_SESSION_CHARACTERS} 個 AI 同時參與對話`, 'error');
    return;
  }

  isSending = true;
  document.getElementById('sendBtn').disabled = true;
  setRosterControlsDisabled(true);
  input.value = '';
  input.style.height = 'auto';

  if (!currentSessionId) {
    const ok = await createNewSession(rosterIds);
    if (!ok) {
      isSending = false;
      document.getElementById('sendBtn').disabled = false;
      setRosterControlsDisabled(false);
      input.value = content;
      autoResize(input);
      return;
    }
  }

  appendMessage('user', content);
  scrollToBottom();

  const firstMsgEl = appendMessage('assistant', '', null, false);
  setTypingState(firstMsgEl, true);
  const resultEls = new Map([[0, firstMsgEl]]);
  const debugAttached = new Set();
  let toolStatusEl = null;
  let receivedAnyResult = false;

  try {
    const resp = await fetch(`${API}/chat/stream-sync`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({content, session_id: currentSessionId, character_ids: rosterIds}),
    });
    if (!resp.ok) {
      let message = `HTTP ${resp.status}`;
      try {
        const err = await resp.json();
        message = err.detail || err.message || message;
      } catch {}
      throw new Error(message);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        if (event.type === 'tool_status') {
          if (event.action === 'calling') {
            toolStatusEl = document.createElement('div');
            toolStatusEl.className = 'msg system-info tool-status';
            toolStatusEl.innerHTML = `<span class="spinner"></span>${escapeHtml(event.message || event.tool_name || 'calling tool...')}`;
            document.getElementById('messages').insertBefore(toolStatusEl, firstMsgEl);
          } else if (event.action === 'complete' && toolStatusEl) {
            toolStatusEl.innerHTML = `&#10003; ${escapeHtml(event.message || 'tool complete')}`;
            toolStatusEl.style.color = 'var(--accent2)';
            toolStatusEl = null;
          }
        } else if (event.type === 'thinking_speech') {
          const ts = document.createElement('div');
          ts.className = 'msg system-info';
          ts.textContent = event.content;
          document.getElementById('messages').insertBefore(ts, firstMsgEl);
        } else if (event.type === 'roster_changed') {
          currentCharacterIds = event.active_character_ids || currentCharacterIds;
          currentCharacterId = currentCharacterIds[0] || currentCharacterId;
          currentSessionMode = event.session_mode || (currentCharacterIds.length > 1 ? 'group' : 'single');
          appendSystemEvent(event.content || 'AI roster changed', firstMsgEl);
        } else if (event.type === 'error') {
          if (receivedAnyResult) {
            clearTypingPlaceholders(resultEls);
            console.warn('[chat] stream error after result:', event.message);
          } else {
            const targetEl = resultEls.get(0) || firstMsgEl;
            targetEl.classList.remove('typing');
            targetEl.querySelector('.md-content').innerHTML = `<span style="color:var(--error)">${escapeHtml(event.message)}</span>`;
          }
        } else if (event.type === 'typing') {
          const turnIndex = event.turn_index || 0;
          let targetEl = resultEls.get(turnIndex);
          if (!targetEl) {
            targetEl = appendMessage('assistant', '', null, false, event.character_name, event.character_id);
            resultEls.set(turnIndex, targetEl);
          }
          setMessageAuthor(targetEl, event.character_name);
          setTypingState(targetEl, true);
        } else if (event.type === 'result') {
          receivedAnyResult = true;
          const turnIndex = event.turn_index || 0;
          let targetEl = resultEls.get(turnIndex);
          if (!targetEl) {
            targetEl = appendMessage('assistant', '', null, false, event.character_name, event.character_id);
            resultEls.set(turnIndex, targetEl);
          }
          const mdDiv = targetEl.querySelector('.md-content');
          targetEl.classList.remove('typing');
          mdDiv.innerHTML = marked.parse(event.reply || '');
          enhanceRenderedMarkdown(mdDiv);
          setMessageAuthor(targetEl, event.character_name);
          if (event.retrieval_context && !debugAttached.has(turnIndex)) {
            targetEl.appendChild(buildDebugPanel(event));
            debugAttached.add(turnIndex);
          }
          if (event.session_id && event.session_id !== currentSessionId) {
            currentSessionId = event.session_id;
            updateSessionDisplay();
          }
        } else if (event.type === 'group_done') {
          if ((event.turn_count || 0) > 0) receivedAnyResult = true;
          // 多 AI 回合已全部結束；單一對話不會送此事件。
          if ((event.turn_count || 0) === 0) {
            const targetEl = resultEls.get(0) || firstMsgEl;
            targetEl.classList.remove('typing');
            targetEl.querySelector('.md-content').textContent = '（無回應）';
          }
        } else if (event.type === 'tts_audio') {
          console.log('[TTS] SSE 收到 tts_audio 事件，format:', event.format, 'data len:', (event.data||'').length);
          playTtsAudio(event.data, event.format || 'mp3');
        }
        scrollToBottom();
      }
    }
  } catch (e) {
    if (receivedAnyResult) {
      clearTypingPlaceholders(resultEls);
      console.warn('[chat] stream closed after result:', e);
    } else {
      const targetEl = resultEls.get(0) || firstMsgEl;
      targetEl.classList.remove('typing');
      targetEl.querySelector('.md-content').innerHTML = `<span style="color:var(--error)">Connection error: ${escapeHtml(String(e))}</span>`;
    }
  }

  isSending = false;
  document.getElementById('sendBtn').disabled = false;
  setRosterControlsDisabled(false);
  scrollToBottom();
  loadSessionList();
}

function appendSystemEvent(content, beforeEl=null, scroll=true) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system-info';
  div.textContent = content || '';
  if (beforeEl && beforeEl.parentNode === container) {
    container.insertBefore(div, beforeEl);
  } else {
    container.appendChild(div);
  }
  if (scroll) scrollToBottom();
  return div;
}

function appendMessage(role, content, debugData, scroll=true, characterName=null, characterId=null) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (characterId) div.dataset.characterId = characterId;

  if (role === 'user') {
    div.textContent = content;
  } else {
    if (characterName) {
      const author = document.createElement('div');
      author.className = 'msg-author';
      author.textContent = characterName;
      div.appendChild(author);
    }
    const mdDiv = document.createElement('div');
    mdDiv.className = 'md-content';
    if (content) {
      mdDiv.innerHTML = marked.parse(content);
      enhanceRenderedMarkdown(mdDiv);
    }
    div.appendChild(mdDiv);
  }

  container.appendChild(div);
  if (scroll) scrollToBottom();
  return div;
}

function setMessageAuthor(msgEl, characterName) {
  if (!msgEl || !characterName) return;
  let author = msgEl.querySelector('.msg-author');
  if (!author) {
    author = document.createElement('div');
    author.className = 'msg-author';
    msgEl.insertBefore(author, msgEl.firstChild);
  }
  author.textContent = characterName;
}

function setTypingState(msgEl, active) {
  if (!msgEl) return;
  const mdDiv = msgEl.querySelector('.md-content');
  if (!mdDiv) return;
  msgEl.classList.toggle('typing', !!active);
  if (!active) return;
  mdDiv.innerHTML = `
    <div class="typing-indicator" aria-label="typing">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
}

function clearTypingPlaceholders(resultEls) {
  resultEls.forEach(el => {
    if (!el?.classList.contains('typing')) return;
    const mdDiv = el.querySelector('.md-content');
    el.classList.remove('typing');
    if (mdDiv?.querySelector('.typing-indicator')) {
      el.remove();
    }
  });
}

function enhanceRenderedMarkdown(root) {
  root.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  root.querySelectorAll('img').forEach(img => {
    img.loading = 'lazy';
    img.onclick = () => {
      if (img.src) window.open(img.src, '_blank', 'noopener');
    };
  });
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function buildDebugPanel(data) {
  const ctx = data.retrieval_context || {};
  const wrapper = document.createElement('div');
  const toggle = document.createElement('div');
  toggle.className = 'debug-toggle';
  toggle.textContent = '[ debug info ]';
  const panel = document.createElement('div');
  panel.className = 'debug-panel';
  toggle.onclick = () => panel.classList.toggle('open');
  wrapper.appendChild(toggle);

  let html = '';
  if (ctx.perf_timing && ctx.perf_timing.steps) {
    const maxMs = Math.max(...ctx.perf_timing.steps.map(s => s.ms), 1);
    html += `<div class="debug-section"><div class="debug-section-title">Performance (${ctx.perf_timing.total_ms?.toFixed(0) || '?'}ms)</div>`;
    ctx.perf_timing.steps.forEach(s => {
      const pct = (s.ms / maxMs * 100).toFixed(0);
      html += `<div class="perf-bar-row">
        <span class="perf-bar-label" title="${escapeHtml(s.name)}">${escapeHtml(s.name)}</span>
        <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${pct}%"></div></div>
        <span class="perf-bar-ms">${s.ms.toFixed(0)}ms</span>
      </div>`;
    });
    html += '</div>';
  }

  if (ctx.block_details && ctx.block_details.length) {
    html += `<div class="debug-section"><div class="debug-section-title">Memory Blocks (${ctx.block_count || ctx.block_details.length}, threshold: ${ctx.threshold}, hard: ${ctx.hard_base})</div>`;
    ctx.block_details.forEach(b => {
      html += `<div class="block-detail">
        <strong>#${b.id}</strong> ${escapeHtml(b.overview || '')}
        <br><span class="block-score" style="color:var(--accent)">hybrid:${b.hybrid?.toFixed(3)}</span>
        <span class="block-score">dense:${b.dense?.toFixed(3)}</span>
        <span class="block-score">sparse:${b.sparse?.toFixed(3)}</span>
        <span class="block-score" style="color:var(--warn)">recency:${b.recency?.toFixed(3)}</span>
        <span class="block-score" style="color:var(--purple)">importance:${b.importance?.toFixed(3)}</span>
      </div>`;
    });
    html += '</div>';
  }

  if (ctx.core_debug_text) {
    html += `<div class="debug-section"><div class="debug-section-title">Core Cognition</div><pre>${escapeHtml(ctx.core_debug_text)}</pre></div>`;
  }
  if (ctx.profile_debug_text) {
    html += `<div class="debug-section"><div class="debug-section-title">User Profile</div><pre>${escapeHtml(ctx.profile_debug_text)}</pre></div>`;
  }
  if (ctx.expanded_keywords || ctx.inherited_tags) {
    html += `<div class="debug-section"><div class="debug-section-title">Retrieval Context</div><pre>`;
    html += `query: ${escapeHtml(ctx.original_query || '')}\n`;
    html += `expanded: ${escapeHtml(ctx.expanded_keywords || '')}\n`;
    html += `inherited: ${escapeHtml(JSON.stringify(ctx.inherited_tags || []))}`;
    if (ctx.context_messages_count !== undefined) {
      html += `\ncontext history: ${ctx.context_messages_count} messages sent to LLM`;
    }
    html += `</pre></div>`;
  }
  if (data.extracted_entities && data.extracted_entities.length) {
    html += `<div class="debug-section"><div class="debug-section-title">Extracted Entities</div><div>`;
    data.extracted_entities.forEach(e => {
      html += `<span style="display:inline-block;background:var(--surface2);padding:2px 8px;border-radius:4px;margin:2px;font-size:11px;">${escapeHtml(e)}</span>`;
    });
    html += '</div></div>';
  }
  if (ctx.dynamic_prompt) {
    html += `<div class="debug-section">
      <div class="debug-section-title" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        Dynamic Prompt (click to toggle)
      </div>
      <pre style="display:none;max-height:300px;overflow-y:auto;">${escapeHtml(ctx.dynamic_prompt)}</pre>
    </div>`;
  }

  panel.innerHTML = html;
  wrapper.appendChild(panel);
  return wrapper;
}

</script>
